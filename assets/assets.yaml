  mode: portrait
  png: portrait/npc/verde/verde.png
  map: verde.tmx
  map_layer: map
  map_bank1: 384
  palettes_bg: 6
  palettes_obj: 6
  # Overlay region ($769b-$788e): 3-frame talking-eye animation + 2 static metasprites
