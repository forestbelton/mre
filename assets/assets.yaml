  png: screen/tower_open/tower_open.png
  map: tower_open.tmx

room_start:
  mode: screen
  png: screen/room_start/room_start.png
  map: room_start.tmx

room_clear:
  mode: screen
  png: screen/room_done/room_done.png
  map: room_done.tmx

title:
  mode: screen
  png: screen/title/title.png
  map: title.tmx

# Character portraits (src/gfx/portrait/npc/*.asm). The arrangement is the
# committed <name>.tmx next to each sheet (open it in Tiled); no derived
# layouts, no map bins.
kalum:
  mode: portrait
  png: portrait/npc/kalum/kalum.png
  map: kalum.tmx
  map_layer: map
  map_bank1: 384
  palettes_bg: 6
  palettes_obj: 6
  # Overlay region ($5a3e-$5b18): eyes blink-animation frames + shoulder/collar + Selketo eye.
  sprites: sprites/sprites.yaml

toamuna:
