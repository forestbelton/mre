# Graphics asset descriptor -- the single place that lists every PNG-driven asset,
# so adding one is a YAML edit, not a Makefile change. tools/buildassets.py reads
# this and runs tools/pngasset.py per entry (output -> build/assets/<dir>/, which
# the asm INCBINs). See docs/gfx_assets.md.
#
# The directory layout mirrors src/gfx: logo/ and intro/ at the top, screen/ and
# portrait/ groups below. Each entry's key is just a label; the output dir is
# derived from the PNG's parent dir name (assets/screen/town/town.png ->
# build/assets/town). Fields:
#   mode: composite  -- one self-contained image; the tool derives tiles + tilemap
#                       (every tile is visible). Opts: sheet_rows, pad_before, colors.
#   mode: screen     -- two-VRAM-bank colour screen; one combined tile-sheet PNG
#                       (both banks stacked + 16 palettes embedded). Opt: tiles.
#   mode: portrait   -- grayscale character portrait; one tile-sheet PNG (bank-1
#                       tiles first, then any bank-0 tiles). Opts: tiles1, tiles0.

logo:
  mode: composite
  png: logo/logo.png
  sheet_rows: 8
  pad_before: [0, 4096]   # $1000 blank-tile VRAM block before the sheet

intro_book:                # 10x20 (top half of the screen)
  mode: screen
  png: intro/intro.png

# Full-screen backgrounds (src/gfx/screen/*.asm).
town:
  mode: screen
  png: screen/town/town.png

tower:
  mode: screen
  png: screen/tower/tower.png

tower_open:
  mode: screen
  png: screen/tower_open/tower_open.png

room_start:
  mode: screen
  png: screen/room_start/room_start.png

room_clear:
  mode: screen
  png: screen/room_done/room_done.png

title:
  mode: screen
  png: screen/title/title.png

# Character portraits (src/gfx/portrait/*.asm; grayscale, palettes not yet located).
kalum:
  mode: portrait
  png: portrait/kalum/kalum.png

toamuna:
  mode: portrait
  png: portrait/toamuna/toamuna.png

rafaga:
  mode: portrait
  png: portrait/rafaga/rafaga.png

tempest:
  mode: portrait
  png: portrait/tempest/tempest.png

naji:
  mode: portrait
  png: portrait/naji/naji.png

pashute:
  mode: portrait
  png: portrait/pashute/pashute.png

bodka:
  mode: portrait
  png: portrait/bodka/bodka.png

ferious:                     # two-bank: 384 bank-1 tiles + 128 bank-0 tiles
  mode: portrait
  png: portrait/ferious/ferious.png
  tiles0: 128

nada_intro:                  # two-bank: 384 bank-1 + 384 bank-0 tiles
  mode: portrait
  png: portrait/nada_intro/nada_intro.png
  tiles0: 384

nada_scene2:                 # single owned sheet; shares nada_intro's bank-0 tiles
  mode: portrait
  png: portrait/nada_scene2/nada_scene2.png
