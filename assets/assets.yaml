# Graphics asset descriptor -- the single place that lists every PNG-driven asset,
# so adding one is a YAML edit, not a Makefile change. tools/buildassets.py reads
# this and runs tools/pngasset.py per entry (output -> build/assets/<dir>/, which
# the asm INCBINs). It also auto-builds the legacy assets/<name>/asset.json assets
# via gfxasset.py. See docs/gfx_assets.md.
#
# Each entry's key is just a label; the output dir is derived from the PNG path
# (assets/town_screen/town.png -> build/assets/town_screen; assets/logo.png ->
# build/assets/logo). Fields:
#   mode: composite  -- one self-contained image; the tool derives tiles + tilemap
#                       (every tile is visible). Opts: sheet_rows, pad_before, colors.
#   mode: screen     -- two-VRAM-bank colour screen; one combined tile-sheet PNG
#                       (both banks stacked + 16 palettes embedded). Opt: tiles.
#   mode: portrait   -- grayscale character portrait; one tile-sheet PNG (bank-1
#                       tiles first, then any bank-0 tiles). Opts: tiles1, tiles0.

logo:
  mode: composite
  png: logo.png
  sheet_rows: 8
  pad_before: [0, 4096]   # $1000 blank-tile VRAM block before the sheet

town:
  mode: screen
  png: town_screen/town.png

tower:
  mode: screen
  png: tower_entrance/tower_entrance.png

tower_open:
  mode: screen
  png: tower_entrance_open/tower_entrance_open.png

room_start:
  mode: screen
  png: room_start/room_start.png

room_clear:
  mode: screen
  png: room_clear/room_clear.png

title:
  mode: screen
  png: title_screen/title_screen.png

intro_book:                # 10x20 (top half of the screen)
  mode: screen
  png: intro_book/intro_book.png

# Character portraits (grayscale; palettes lib-dispatched, not yet located).
kalum:
  mode: portrait
  png: kalum_portrait/kalum_portrait.png

toamuna:
  mode: portrait
  png: toamuna_portrait/toamuna_portrait.png

rafaga:
  mode: portrait
  png: rafaga_portrait/rafaga_portrait.png

tempest:
  mode: portrait
  png: tempest_portrait/tempest_portrait.png

naji:
  mode: portrait
  png: naji_portrait/naji_portrait.png

pashute:
  mode: portrait
  png: pashute_portrait/pashute_portrait.png

bodka:
  mode: portrait
  png: bodka_portrait/bodka_portrait.png

ferious:                     # two-bank: 384 bank-1 tiles + 128 bank-0 tiles
  mode: portrait
  png: ferious_portrait/ferious_portrait.png
  tiles0: 128

nada_intro:                  # two-bank: 384 bank-1 + 384 bank-0 tiles
  mode: portrait
  png: nada_intro/nada_intro.png
  tiles0: 384

nada_scene2:                 # single owned sheet; shares nada_intro's bank-0 tiles
  mode: portrait
  png: nada_scene2/nada_scene2.png
