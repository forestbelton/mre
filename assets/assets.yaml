# Graphics asset descriptor -- the single place that lists every PNG-driven asset,
# so adding one is a YAML edit, not a Makefile change. tools/buildassets.py reads
# this and runs tools/pngasset.py per entry (output -> build/assets/<dir>/, which
# the asm INCBINs). See docs/gfx_assets.md.
#
# The directory layout mirrors src/gfx: logo/ and intro/ at the top, screen/ and
# portrait/ groups below. Each entry's key is just a label; the output dir is
# derived from the PNG's parent dir name (assets/screen/town/town.png ->
# build/assets/town). Fields:
#   mode: composite  -- one self-contained image; the tool derives tiles + tilemap
#                       (every tile is visible). Opts: sheet_rows, pad_before, colors.
#   mode: screen     -- two-VRAM-bank colour screen; one combined tile-sheet PNG
#                       (both banks stacked + 16 palettes embedded) + a Tiled .tmx
#                       arrangement (map:). Opts: tiles, map.
#   mode: portrait   -- grayscale character portrait; one tile-sheet PNG (bank-1
#                       tiles first, then any bank-0 tiles). Opts: tiles1, tiles0.
#   mode: scene      -- summon-animation tiles; one combined two-bank tile-sheet PNG
#                       (palettes embedded). Splits tiles/palette; passes descriptors.bin
#                       + metasprites.bin (the BG-frame/OBJ data) through. Opts: tiles, palettes.

logo:
  mode: composite
  png: logo/logo.png
  sheet_rows: 8
  pad_before: [0, 4096]   # $1000 blank-tile VRAM block before the sheet

intro_book:                # 10x20 (top half of the screen)
  mode: screen
  png: intro/intro.png
  map: intro.tmx

# Full-screen backgrounds (src/gfx/screen/*.asm).
town:
  mode: screen
  png: screen/town/town.png
  map: town.tmx

tower:
  mode: screen
  png: screen/tower/tower.png
  map: tower.tmx

tower_open:
  mode: screen
  png: screen/tower_open/tower_open.png
  map: tower_open.tmx

room_start:
  mode: screen
  png: screen/room_start/room_start.png
  map: room_start.tmx

room_clear:
  mode: screen
  png: screen/room_done/room_done.png
  map: room_done.tmx

title:
  mode: screen
  png: screen/title/title.png
  map: title.tmx

# Character portraits (src/gfx/portrait/*.asm). Maps are derived from the layout
# constant + the indexed sheet (layout:); only the nada pair still commits map bins.
kalum:
  mode: portrait
  png: portrait/kalum/kalum.png
  layout: standard
  palettes_bg: 6
  palettes_obj: 6
  # Overlay region ($5a3e-$5b18): eyes blink-animation frames + shoulder/collar + Selketo eye.
  sprites: sprites/sprites.yaml

toamuna:
  mode: portrait
  png: portrait/toamuna/toamuna.png
  layout: standard
  palettes_bg: 6
  palettes_obj: 6
  # Overlay region ($5a3e-$5ae7): two static expressions (default + alt), each a
  # hair metasprite + a face patch -- the layered source (one PNG/block + sprites.yaml).
  sprites: sprites/sprites.yaml

rafaga:
  mode: portrait
  png: portrait/rafaga/rafaga.png
  layout: standard
  palettes_bg: 6
  palettes_obj: 6
  # Overlay region ($7557-$75ec): two-frame eyes/blink animation + three static
  # overlay metasprites -- the layered source (one PNG/block + sprites.yaml).
  sprites: sprites/sprites.yaml

tempest:
  mode: portrait
  png: portrait/tempest/tempest.png
  layout: standard
  palettes_bg: 6
  palettes_obj: 6
  # Overlay region ($7625-$76da): two-frame eyes/blink animation + three static
  # overlay metasprites -- the layered source (one PNG/block + sprites.yaml).
  sprites: sprites/sprites.yaml

naji:
  mode: portrait
  png: portrait/naji/naji.png
  layout: standard
  palettes_bg: 6
  palettes_obj: 6
  # Overlay region ($7526-$762b): talking eyes-animation + smile expression, vest,
  # collar -- the layered source (one PNG/block + sprites.yaml).
  sprites: sprites/sprites.yaml

pashute:
  mode: portrait
  png: portrait/pashute/pashute.png
  layout: pashute          # its own bottom-band packing; maps derived, no bins
  palettes_bg: 6
  palettes_obj: 6
  # Metasprite/patch overlay region ($5a3e-$5bdc): eyes blink-animation frames,
  # shoulders, collar, sad/shocked faces -- layered source (one PNG/block + sprites.yaml).
  sprites: sprites/sprites.yaml

bodka:
  mode: portrait
  png: portrait/bodka/bodka.png
  layout: standard
  palettes_bg: 6
  palettes_obj: 6
  # Overlay region ($5a3e-$5b59): 3-frame talking-eye animation + chest + smile
  # expression -- the layered source (one PNG/block + sprites.yaml).
  sprites: sprites/sprites.yaml

verde:
  mode: portrait
  png: portrait/verde/verde.png
  layout: standard
  palettes_bg: 6
  palettes_obj: 6
  # Overlay region ($769b-$788e): 3-frame talking-eye animation + 2 static metasprites
  # + base patch + calm/surprised expressions (one PNG/block + sprites.yaml). Some eye
  # patches reuse non-local duplicate tiles, pinned per-cell by `idx:` in the manifest.
  sprites: sprites/sprites.yaml
  # second palette set: the intro-scene BG+OBJ palettes ($788e/$78ce).
  palettes2: intro_pals.png

mistral:                     # two-bank: 384 bank-1 tiles + 128 bank-0 tiles (the girl
  mode: portrait             # in the red hood; the bg silhouette is her monster Ferious)
  png: portrait/mistral/mistral.png
  # standard layout, but blank cells collapse to the shared blank tile $80 and
  # their slots were reused for overlay art; reference.png (composed, indexed)
  # says which cells keep their slot. Two blank-cell/blank-slot ties render
  # identically either way -- the original tool's arbitrary picks, pinned.
  layout: standard
  blank_byte: '0x80'
  reference: reference.png
  map_overrides: {123: 0x80, 143: 0x80}
  tiles0: 128
  palettes_bg: 6
  palettes_obj: 6
  # Overlay region ($623e-$6536): Mistral's 3-frame body/face animation -- a big two-bank
  # body patch + face/hat/tassels metasprites per frame -- plus her collar and the
  # ferious_eye glow on the bg monster silhouette (Ferious is BG tilemap, not overlay).
  # frame1's body patch mixes tile banks (bank0 map); a few pixel-twin tiles pin
  # via idx.
  sprites: sprites/sprites.yaml

nada_intro:                  # two-bank: 384 bank-1 + 384 bank-0 tiles
  mode: portrait
  png: portrait/nada_intro/nada_intro.png
  tiles0: 384
  palettes_bg: 6
  palettes_obj: 6
  # Overlay region ($723e-$7755, shared by nada_intro + nada_scene2): Nada's 7-frame snap
  # animation (snap_body two-bank 5x9 patch + snap_hand metasprite each, intro-only) plus
  # her talking-mouth/face frames, the angry/rage expression, and the monster_eye glow.
  # Some metasprite records draw from the bank-0 sheet (per-record bank0 map, like the
  # patches); the busy two-bank snap_body patches pin pixel-twin tiles via idx.
  sprites: sprites/sprites.yaml

# nada_scene2 reuses nada_intro's $1c:$7000 palette (and bank-0 sheet); its PNG is
# colourised for editing but it owns no palette bytes to carve.
nada_scene2:                 # single owned sheet; shares nada_intro's bank-0 tiles
  mode: portrait
  png: portrait/nada_scene2/nada_scene2.png

# --- Summon-animation scenes (bank-$05 scene VM). Editable two-bank tile sheet + palette
# from one indexed PNG; each scene's BG descriptor frames + metasprite lists stay as data
# (their composed-frame layout doesn't reverse cleanly -- ~700 ambiguous cells/scene).
tiger:                        # summon scene 0 (descriptors live in bank $05/scene.asm)
  mode: scene
  png: scene/tiger/tiles.png
  tiles: 384
  palettes: 16

mocchi:                       # summon scene 1 (43 palettes -- base 16 + animation frames)
  mode: scene
  png: scene/mocchi/tiles.png
  tiles: 384
  palettes: 43

hare:                         # summon scene 2
  mode: scene
  png: scene/hare/tiles.png
  tiles: 384
  palettes: 16

gali:                         # summon scene 3 (descriptors shared in bank $0c/summon_maps)
  mode: scene
  png: scene/gali/tiles.png
  tiles: 384
  palettes: 16

golem:                        # summon scene 4: 384+384 tiles, 16 palettes (8 BG + 8 OBJ)
  mode: scene
  png: scene/golem/tiles.png
  tiles: 384
  palettes: 16

suezo:                        # summon scene 5 (20 palettes)
  mode: scene
  png: scene/suezo/tiles.png
  tiles: 384
  palettes: 20

phenix:                       # summon scene 6 (descriptors+metasprites shared in bank $0c)
  mode: scene
  png: scene/phenix/tiles.png
  tiles: 384
  palettes: 18

scene7:                       # capture animation (shared wSceneState=7; 26 palettes)
  mode: scene
  png: scene/scene7/tiles.png
  tiles: 384
  palettes: 26

# Room screen (bank $25): two room-type tile variants + their tilemaps/palettes. The
# editable tiles.png stacks tileset A ($4000) over tileset B ($5800) with the 32 palettes
# (2 sets of 8 BG + 8 OBJ) embedded; the two CopyBgMap tilemaps stay structured in the asm.
room_screen:
  mode: scene
  png: screen/room_screen/tiles.png
  tiles: 384
  palettes: 32

# Cox flashback (bank $13, src/text/scripts/cox.asm): the 256-tile sheet -- 16x16
# OBJ character frames (Cox, Alf, the monster) on top, the SOLOMON-monitor/room
# BG tiles below, all loaded to VRAM bank 1 -- with its 8 BG + 8 OBJ palettes
# embedded. The CopyBgMap tilemaps, metasprite frames and staff-roll text stay
# structured in cox.asm.
cox_flashback:
  mode: scene
  png: cox/tiles.png
  tiles: 128
  palettes: 16
