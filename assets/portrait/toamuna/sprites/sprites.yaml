# toamuna's metasprite/patch overlay region, the editable layered source: one
# PNG per block + placement metadata. Regenerated byte-exact by
# tools/pngasset.py (gen_sprite_region). 'base' must equal the asm SECTION
# address (patch pointers are absolute).
base: '0x5a3e'
prefix: Toamuna        # emit structured sprites.asm (Toamuna_<role> labels) instead of .bin
blocks:
- role: face
  kind: patch
  png: face.png
- role: hair
  kind: meta
  png: hair.png
- role: alt_face
  kind: patch
  png: alt_face.png
- role: alt_hair
  kind: meta
  png: alt_hair.png
