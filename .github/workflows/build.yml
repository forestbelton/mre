name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Pin RGBDS to the version the project is developed against (see README).
      RGBDS_VERSION: "1.0.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bison libpng-dev pkg-config

      - name: Cache RGBDS
        id: cache-rgbds
        uses: actions/cache@v4
        with:
          path: ~/.local/rgbds
          key: rgbds-${{ env.RGBDS_VERSION }}-${{ runner.os }}

      - name: Build and install RGBDS ${{ env.RGBDS_VERSION }}
        if: steps.cache-rgbds.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/gbdev/rgbds/releases/download/v${RGBDS_VERSION}/rgbds-${RGBDS_VERSION}.tar.gz" -o rgbds.tar.gz
          mkdir -p rgbds-src
          tar -xzf rgbds.tar.gz -C rgbds-src --strip-components=1
          make -C rgbds-src -j"$(nproc)"
          make -C rgbds-src install PREFIX="$HOME/.local/rgbds"

      - name: Add RGBDS to PATH
        run: echo "$HOME/.local/rgbds/bin" >> "$GITHUB_PATH"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip Pillow PyYAML

      - name: Show tool versions
        run: |
          rgbasm --version
          rgblink --version
          rgbfix --version
          rgbgfx --version
          python --version

      - name: Build and verify ROM
        run: make verify
