name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Pin RGBDS to the version the project is developed against (see README).
      RGBDS_VERSION: "1.0.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpng16-16

      - name: Install RGBDS ${{ env.RGBDS_VERSION }}
        run: |
          curl -fsSL "https://github.com/gbdev/rgbds/releases/download/v${RGBDS_VERSION}/rgbds-linux-x86_64.tar.xz" -o rgbds.tar.xz
          mkdir -p "$HOME/.local/rgbds"
          tar -xJf rgbds.tar.xz -C "$HOME/.local/rgbds"
          echo "$HOME/.local/rgbds" >> "$GITHUB_PATH"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip Pillow PyYAML

      - name: Show tool versions
        run: |
          rgbasm --version
          rgblink --version
          rgbfix --version
          rgbgfx --version
          python --version

      - name: Build and verify ROM
        run: make verify
